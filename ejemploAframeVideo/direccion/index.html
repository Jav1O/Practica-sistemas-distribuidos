<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Flechas superpuestas</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    /* Contenedor del vídeo ocupando toda la pantalla */
    #camVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      overflow: hidden;
      z-index: 1;
    }

    #camVideo video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* A‑Frame encima del vídeo */
    a-scene {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <!-- Vídeo de la cámara visible -->
  <div id="camVideo">
    <video id="videoStream" autoplay playsinline></video>
  </div>

  <!-- Escena A‑Frame transparente -->
  <a-scene embedded renderer="alpha: true; antialias: true" vr-mode-ui="enabled: false">

    <a-assets>
      <!-- Imagen de flecha (puedes sustituirla por la del enlace) -->
      <img id="fArriba" src="arriba.jpg">
      <img id="fAbajo" src="abajo.jpg">
      <img id="fIzquierda" src="izquierda.jpg">
      <img id="fDerecha" src="derecha.jpg">
    </a-assets>

    <a-entity id="cameraRig">
      <a-camera position="0 0 0" wasd-controls="enabled: false" look-controls="enabled: true"></a-camera>
    </a-entity>

    <!-- Flecha como plano con textura -->
    <a-plane id="arrow"
      src="#fArriba"
      height="1"
      width="1"
      position="-2 0.6 -1.5"
      rotation="0 0 0"
      transparent="true">
    </a-plane>

    <a-entity id="arrowText" text="value: Sigue recto; color: white; width: 2" position="-1.5 0 -1.5"> </a-entity>

  </a-scene>

  <script>
    // Activar cámara en el DIV
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });

        const video = document.getElementById("videoStream");
        video.srcObject = stream;

      } catch (err) {
        console.error("Error al acceder a la cámara:", err);
      }
    }

    // Control de flechas con teclado
    function initKeyboardControls() {
      const arrow = document.getElementById("arrow");

      // Dirección actual para evitar movimientos innecesarios
      let currentDirection = null;

      window.addEventListener("keydown", (event) => {
        let texto=""
        let img = "";
        let rotation = null;

        switch (event.key) {
          case "ArrowUp":
            img = "fArriba";
            texto="Sigue recto";
            rotation = { x: 0, y: 0, z: 0 };
            break;

          case "ArrowDown":
            img = "fAbajo";
            texto="Da la vuelta";
            rotation = { x: 0, y: 0, z: 180 };
            break;

          case "ArrowLeft":
            img = "fIzquierda";
            texto="Gira a la izquierda";
            rotation = { x: 0, y: 0, z: 90 };
            break;

          case "ArrowRight":
            img = "fDerecha";
            texto="Gira a la derecha";
            rotation = { x: 0, y: 0, z: -90 };
            break;

          default:
            return;
        }

        // Actualizamos rotación y dirección
        arrow.setAttribute("src", `#${img}`);
        document.getElementById("arrowText").setAttribute("text", "value: " + texto); 
        //arrow.setAttribute("rotation", rotation);
        //currentDirection = newDirection;
      });
    }

    window.addEventListener("load", () => {
      initCamera();
      initKeyboardControls();
    });
  </script>

</body>
</html>
