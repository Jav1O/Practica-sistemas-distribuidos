<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤 Preguntar el Clima con Voz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f4f4;
            padding: 20px;
        }
        #weather-info {
            margin-top: 20px;
            padding: 20px;
            background: white;
            display: inline-block;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }
        #temperature {
            font-size: 22px;
            font-weight: bold;
        }
        button {
            padding: 10px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Pregunta el Clima con la Voz</h1>
    <p>Di "¿Cuál es el clima?" para obtener la información del tiempo en tu ubicación.</p>

    <button id="speak-btn">Hablar</button>

    <div id="weather-info">
        <p>Ubicación: <span id="location">---</span></p>
        <p>Temperatura: <span id="temperature">---</span>°C</p>
        <p>Viento: <span id="wind">---</span> km/h</p>
    </div>

    <script src="script.js"> </script>

</body>
</html>
